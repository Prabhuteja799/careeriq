spring:
  application:
    name: careeriq-backend

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema — never let Hibernate alter it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50          # Bulk inserts for match_scores
        order_inserts: true
        order_updates: true

  # ── Flyway (database migrations) ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # ── File Upload ───────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── Redis (Redisson) ──────────────────────────────────────────────────────────
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}

redisson:
  single-server-config:
    address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
    password: ${REDIS_PASSWORD:}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}             # Min 256-bit key — set in .env
  expiration-ms: 86400000           # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME}
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}

# ── AI APIs ───────────────────────────────────────────────────────────────────
ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    base-url: https://api.anthropic.com/v1
    model: claude-sonnet-4-20250514
    max-tokens: 1000
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: https://api.openai.com/v1
    embedding-model: text-embedding-3-small
    embedding-dimensions: 1536

# ── App Config ────────────────────────────────────────────────────────────────
careeriq:
  delta-sync:
    interval-ms: 3600000          # Run every 1 hour
    batch-size: 100               # Process 100 candidates per batch
  matching:
    backfill-days: 7              # Score last 7 days of jobs on resume upload
    score-weights:
      skill: 0.40
      role: 0.25
      experience: 0.20
      seniority: 0.15
  cache:
    matches-ttl-seconds: 3600     # Cache user matches for 1 hour
    search-ttl-seconds: 1800      # Cache search results for 30 min

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.careeriq: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
